ont-size="12" font-style="italic" x="935" y="150">Breadcrumb = the `parent` chain,</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="166">and the way back into Mode 2.</text><path d="m640 284c60 36 270 6 290-4" fill="none" stroke="#4a6fa5" stroke-dasharray="4 3" stroke-width="1.2"/><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="240">Prerequisites callout: each entry</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="256">from `prerequisites`, with its own</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="272">completion state and link. Note the</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="288">cross-branch prereq (interactionism)</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="304">— exactly what the tree excludes.</text><path d="m640 600c110 40 270 0 290-10" fill="none" stroke="#4a6fa5" stroke-dasharray="4 3" stroke-width="1.2"/><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="560">Fixed body headings from schema.</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="576">Perspectives shows the theory-node</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="592">variant established in the stress</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="608">test (docs/schema-review.md).</text><path d="m640 836c110 34 270-36 290-46" fill="none" stroke="#4a6fa5" stroke-dasharray="4 3" stroke-width="1.2"/><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="740">`adapted_from` rendered as a</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="756">visible CC BY line: attribution</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="772">travels with the material on</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="788">screen, not just in the repo.</text><path d="m636 145c64-25 274-55 294-55" fill="none" stroke="#4a6fa5" stroke-dasharray="4 3" stroke-width="1.2"/><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="80">Banner appears whenever `status`</text><text fill="#4a6fa5" font-size="12" font-style="italic" x="935" y="96">≠ published — honest maturity signal.</text></svg>