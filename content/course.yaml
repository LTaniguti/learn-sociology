# Mode 1 course manifest — the single source of linear course ordering.
#
# Reordering the course is an edit to this file only, never to node
# frontmatter: ordering is a property of the course, not the concept
# (see docs/schema.md, "Where Mode 1's course order lives").
#
# Modules and node order mirror docs/concept-list.md. A build check may
# verify that no node appears before its `prerequisites`.

